name: YouTube Liste Guncelleyici

on:
  schedule:
    - cron: "0 */3 * * *" # Her 3 saatte bir çalışır
  workflow_dispatch:      # Manuel tetikleme için

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Depoyu Kontrol Et
        uses: actions/checkout@v4

      - name: Veriyi Cek
        # -f hata durumunda (404, 500 vb.) curl'ün hata kodu döndürmesini sağlar
        run: curl -L -k -s -f "https://live.weebtv.workers.dev/" -o YouTube.json

      - name: Dosya Kontrol ve Hata Ayıklama
        run: |
          if [ ! -s YouTube.json ]; then
            echo "HATA: YouTube.json dosyası boş veya oluşturulamadı!"
            ls -lh # Mevcut dosyaları listele (hata ayıklama için)
            exit 1
          fi
          echo "Dosya başarıyla çekildi. Boyut: $(stat -c%s YouTube.json) byte."

      - name: Kaydet ve Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add YouTube.json
          # Değişiklik yoksa hata vermeden geçmesi için '|| echo' ekledik
          git commit -m "Oto Guncelleme: $(date)" || echo "Değişiklik yok, commit atılmadı."
          git push origin main
